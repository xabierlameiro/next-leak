name: Mutation testing

# Deliberately not a per-PR gate: a full Stryker run takes minutes and its
# score moves slowly. Weekly (and on demand) keeps the signal without taxing
# every change.
on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Stryker
        run: pnpm test:mutation

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 30
