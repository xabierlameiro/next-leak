name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The tool requires Node >= 22 and is validated on both current LTS
        # lines; the measurement ritual depends on V8 GC/snapshot behaviour,
        # so a version bump must be proven, not assumed.
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests (unit + integration + e2e)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Pack smoke — install the real tarball and measure the fixture app
        run: pnpm pack:smoke
