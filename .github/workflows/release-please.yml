name: Release

on:
  push:
    branches: [main]
  # Recovery hatch: publish an existing tag when the automatic run could not
  # (e.g. a misconfigured trusted publisher fixed after the release landed).
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish (e.g. v0.1.1)
        required: true

permissions:
  contents: write
  pull-requests: write
  # OIDC for npm trusted publishing — no long-lived token anywhere.
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || needs.release-please.outputs.tag_name }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: npm --version
      - run: npm publish --access public
