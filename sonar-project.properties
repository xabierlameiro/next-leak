sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
sonar-project.properties [7L]

# S5332 (use https): the control channel binds 127.0.0.1 only, and the
# flagged "http://control.local" string is a URL-parsing base for request
# paths, never a network destination. HTTPS is meaningless there.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.e1.resourceKey=src/control-server.ts

